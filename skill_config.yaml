default_query: "artificial intelligence"
default_keywords: []

time_range:
  start: "2025-01-01"
  end: "2026-12-31"

retrieval:
  max_candidates: 250
  min_keyword_hits: 0
  category_allowlist:
    - cs.CV
    - cs.AI
    - cs.LG

ranking:
  semantic: 0.45
  keyword: 0.35
  recency: 0.20

summarization:
  enabled: true
  top_k: 10
  provider: "openai"
  model: "gpt-4.1-mini"
  temperature: 0.2
  max_output_tokens: 500

output:
  output_dir: "outputs"
  json_filename: "papers.json"
  markdown_filename: "brief.md"

topics:
  Large Language Models:
    query: "large language models"
    keywords:
      - "LLM"
      - "instruction tuning"
      - "reasoning"
      - "alignment"

  Graph Learning:
    query: "graph machine learning"
    keywords:
      - "graph neural network"
      - "node classification"
      - "link prediction"
      - "graph representation learning"

  Computer Vision:
    query: "computer vision"
    keywords:
      - "image understanding"
      - "object detection"
      - "segmentation"
      - "visual recognition"
