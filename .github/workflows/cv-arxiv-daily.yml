name: Run Research Skill Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */5 * *"

env:
  GITHUB_USER_NAME: Vincentqyw
  GITHUB_USER_EMAIL: realcat@126.com

jobs:
  build:
    name: update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run research skill pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python run_skill.py --config skill_config.yaml

      - name: Push generated outputs
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automatic update: research skill outputs"
          files: outputs/ README.md docs/
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
